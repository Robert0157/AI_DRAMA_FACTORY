# ========================================== #
# 跨工作流異常協議
# ========================================== #
exception_protocols:
  api_timeout:             "Protocol_ZR (Log Error & Fallback to Zhipu GLM-4)"
  quota_exceeded:          "Protocol_R (Alert CEO via Telegram for Funds)"
  content_blocked:         "Protocol_C (Log Sunk Cost & Drop Topic)"
  minimax_slow:            "Protocol_S (Switch provider to zhipu for batch tasks)"
  vault_shortage_audio:    "Protocol_L (Auto TTAPI Backup via suno_api_engine.py → threshold: Tab4<6, Tab5<5)"
  vault_shortage_visual:   "Protocol_V3 (3-tier fallback: pyramid → relaxed_limit → ignore_all)"
  ttapi_backup_failed:     "Protocol_FAIL (Return error to UI with manual action guidance, NEVER silent fail)"
  ngrok_auth_error:        "ERR_NGROK_4018 → Check NGROK_AUTHTOKEN in .env"
  telegram_parse_error:    "MarkdownV2 special chars → Switch to parse_mode=HTML"
  sqlite_threading_error:  "ProgrammingError → Use vault.conn property only; never vault._get_connection()"
  # v15.5 修復
  gop_boundary_stutter:    "B-frame cross-boundary → Root cause: Open GOP. MUST use -flags +cgop -keyint_min 48 -sc_threshold 0. FIXED in v15.5."
  fade_timing_misalign:    "Fade triggers at wrong timestamp → Root cause: fade before setpts. MUST apply setpts+fps=24 BEFORE fade filter. FIXED in v15.5."
  audio_drift_long_video:  "A/V desync in 10hr+ videos → Check audio sample rate. Drift is always audio-side. FIXED in v15.5 via -ar 48000."
  # v15.6 修復
  video_freeze_concat:     "2s freeze every 8s → Root cause: get_video_duration() dividing by wrong fps. MUST use frames/source_fps from r_frame_rate. FIXED in v15.6."
  core_engine_modification: "multi_scene_processor.py edit without CEO auth → REJECT immediately. Ref: .cursor/rules/protect-multi-scene-processor.mdc"
  # v15.7 新增
  llm_json_truncation:     "MiniMax JSON Expecting value error → Root cause: max_tokens=2048 too low for 190 tracks. Fix: max_tokens=4096 + track_count≤20 + 3-layer JSON cleaning. FIXED in v15.7."
  vault_false_shortage:    "lofi_assembler Phase 4 skipped (庫存為 0) despite 190 WAVs → Root cause: New(dc=0) deficit not filled. Fix: Step 4a fills New deficit from Gen1; total≥1 continues. FIXED in v15.7."
  visual_db_stale_path:    "veo_visual_vault.db file_path pointing to pre-rename filenames → Fix: UPDATE video_assets SET video_id=?, file_path=? after every rename. FIXED in v15.7."
  loop_flash_oscillating:  "Visual flash at 8s loop boundary for oscillating scenes (waves/clouds) → Fix: ping_ prefix triggers Ping-Pong (reverse+forward alternating), math-guaranteed zero-flash. FIXED in v15.7."

# ✅ 跨平台沙盒防護
