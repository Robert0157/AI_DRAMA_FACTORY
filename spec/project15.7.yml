# ========================================== #
# WORKFLOW CONFIGURATION
# ========================================== #
workflow_name: "R&S Echoes Assembly Line (v15.7 Ping-Pong Loop · Broadcast-Grade · CEO Lock)"
workflow_discipline: |
  Tri-Engine LLM (MiniMax/Zhipu/Gemini) with max_tokens=4096 + 3-layer JSON cleaning,
  Visual Pyramid 3-Tier Fallback, Clip Cycling,
  Encode-Once-Repeat, Pre-baked Fade, Pre-baked Reverse (v15.7),
  Ping-Pong Loop Strategy: ping_/ford_ prefix → get_loop_strategy() → base_mid_rev.ts (v15.7),
  Closed GOP (v15.5), Source-FPS Duration Fix (v15.6), Double Insurance re-probe (v15.6),
  Audio Premixing (-ar 48000), Webhook Bot, Single UI Truth,
  CEO-Locked Core Engine (multi_scene_processor.py v15.7),
  lofi_assembler New→Gen1 fallback (v15.7), veo_visual_vault.db path migration (v15.7).

workflow_protocols: |
  - Protocol A (Audio): CEO drops into ceo_approved_beats/{channel}/. AD runs audio_mastering_engine.py targeting channel-specific LUFS (-16 lofi / -18 light_music). Results synced to rs_music_vault.db via _sync_mastered_to_vault().
  - Protocol L (TTAPI Auto-Backup): Triggered automatically when vault is below threshold. Tab5 (pipeline_runner): triggers if ceo_approved_beats/ < 5 tracks. Tab4 (backend.run_phase4_sequence): triggers if vault_ready_for_mix/ usable tracks < 6. Backup order: ① Protocol L derivation (tempo/pitch variation from tracks with derivation_count < 3) → ② TTAPI Suno via suno_api_engine.py. Timeout: 600s/track. Skip flag: --skip-backup.
  - Protocol S (Assembly): lofi_assembler.py sews 1-hour seamless WAV with 4% SFX, enforces --max-derivation-limit. v15.7: New(dc=0) deficit auto-filled from Gen1 pool; VaultShortageException only raised when total==0.
  - Protocol V (Visual): VD manages visual_vault_db.py. Executes 50/25/25 Pyramid Sampling with 3-tier fallback + Clip Cycling. v15.7: All vault videos MUST have ping_/ford_ prefix. After any rename, UPDATE veo_visual_vault.db immediately.
  - Protocol Q (Video Assembly v15.7): QA enforces multi_scene_processor.py v15.7 (CEO LOCKED).
      Pre-Stage: get_loop_strategy(vid_path) reads ping_/ford_ prefix → "pingpong" | "forward".
      Stage 1 (Encode-Once-Repeat + Pre-baked Fade + Pre-baked Reverse):
        - get_video_duration(): frames / source_fps (NOT hardcoded 24.0). Reads r_frame_rate from ffprobe.
        - vf_pre = "setpts=PTS-STARTPTS,fps=24" ALWAYS applied BEFORE fade filter.
        - common_enc: -g 48 -keyint_min 48 -sc_threshold 0 -flags +cgop -video_track_timescale 24000.
        - ping_ prefix: extra pass with vf_rev="reverse,setpts=PTS-STARTPTS,fps=24,{norm}" → base_mid_rev.ts.
        - After encoding base_mid.ts: GOP-QA auto-validates I-frame interval (target 2.0s ±0.063s).
        - Double Insurance: re-probe base_mid.ts actual frame count / 24 → use as loop_list duration.
        - loop_list.txt: ping_ → alternating base_mid/base_mid_rev; ford_ → sequential base_mid×N.
      Stage 2.5: Acrossfade Audio Premix (PCM WAV intermediate, final AAC -ar 48000).
      Stage 2: Zero-recode Matrix Concat (-c:v copy, natural EOF strategy).
  - Protocol M (Metadata): CW generates Tracklist + DistroKid CheatSheet + YouTube CheatSheet via music_metadata_engine.py (provider=minimax, track_count≤20, max_tokens=4096). Tab4 Final Exports panel auto-detects missing docs.
  - Protocol D (Delivery): PM operates Streamlit UI EXCLUSIVELY (Tab1-6). rs_manager.py is DEPRECATED.
  - Protocol T (Telegram): CEO uses Telegram Bot (Webhook v2) for remote vault status, pipeline trigger, and vault cleanup. /status uses HTML parse mode with per-channel breakdown.
  - Protocol DB (Database Access): ALL sqlite access MUST use .conn property (threading.local). _get_connection() is ABOLISHED.
  - Protocol LOCK (CEO Protected Engine): multi_scene_processor.py v15.7 is CEO-locked. ANY modification requires written CEO authorization. See .cursor/rules/protect-multi-scene-processor.mdc.
  - Protocol VN (Video Naming): v15.7 SOP: new video → CEO assigns ping_/ford_ prefix → save to vault/{channel}/ → UPDATE veo_visual_vault.db. Reclassify: rename file + UPDATE DB. NEVER leave files without prefix.

pipeline_runner_phases:
  phase_1_mastering:
    script: "scripts/gear1_prod/audio_mastering_engine.py"
    input: "assets/audio/ceo_approved_beats/{channel}/"
    output: "assets/audio/vault_ready_for_mix/{channel}/"
    skip_flag: "--skip-mastering"
  phase_2_vault_sync:
    function: "_sync_mastered_to_vault()"
    action: "Sync new tracks into rs_music_vault.db with derivation_count=0"
  phase_35_ttapi_backup:
    function: "_run_suno_backup(target_count=5)"
    trigger: "ceo_approved_beats/ track count < 5"
    skip_flag: "--skip-backup"
    sub_steps:
      - "Protocol L derivation (tempo/pitch variation from existing vault tracks)"
      - "Read daily_prompts_{CH}_*.txt or generate via generate_ceo_prompts.py"
      - "suno_api_engine.py → TTAPI POST → poll → download MP3"
      - "audio_mastering_engine.py → rs_music_vault.db sync"
  phase_3_metadata:
    script: "scripts/gear1_prod/music_metadata_engine.py"
    args: "--provider minimax"
    track_count_limit: 20       # v15.7：max(5, min(vault_count, 20))
    output: "Tracklist, DistroKid_CheatSheet, metadata_distrokid_{ch}.json"
    skip_flag: "--skip-metadata"
  phase_4_assembly:
    script: "scripts/gear1_prod/lofi_assembler.py"
    output: "R&S_Echoes_{ch}_1HrMix_[TS].wav"
    skip_flag: "--skip-assembler"
    v157_note: "New(dc=0) deficit auto-filled from Gen1; VaultShortageException only if total==0"
  phase_45_youtube:
    function: "_finalize_youtube_cheatsheet()"
    output: "YouTube_CheatSheet_{ch}_[TS].txt"
  phase_5_video:
    script: "scripts/gear1_prod/multi_scene_processor.py"   # 🔒 v15.7 CEO 鎖定
    version: "v15.7"
    modes: ["--auto-visual", "--bg-video PATH", "--bg-videos PATH..."]
    output: "R&S_Echoes_{ch}_1HrMix_[TS].mp4"
    quality_gate: "GOP-QA: ✅ [GOP-QA] Scene N/N clean — GOP 牢籠完好"
    v157_loop_strategy: "ping_ prefix → Ping-Pong (base_mid_rev.ts alternating); ford_ → Forward"

