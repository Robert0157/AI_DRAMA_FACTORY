  allow_read: ["/Volumes/AI_Workspace/AI_DRAMA_FACTORY", "F:/AI_DRAMA_FACTORY", "."]
  allow_write: ["/Volumes/AI_Workspace/AI_DRAMA_FACTORY", "F:/AI_DRAMA_FACTORY", "."]
