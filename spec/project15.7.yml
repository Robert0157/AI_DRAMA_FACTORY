# ========================================== #
# GLOBAL PROJECT CONFIGURATION (全域專案與資安設定)
# v15.7 — Intelligent Ping-Pong Loop · LLM JSON Fix · Vault Selection Fix · Visual DB Migration
# 最後更新：2026-04-17
#   v15.5：Closed GOP · setpts 優先濾鏡順序 · 嚴格 IDR · 時間基底統一 · GOP-QA · -ar 48000
#   v15.6：get_video_duration 源幀率修正（根治 30fps 素材 2 秒凍結）· 雙重保險 re-probe · CEO 鎖定
#   v15.7：Ping-Pong 智能迴圈（ping_/ford_ 前綴）· LLM JSON 截斷修復 · lofi 偽短缺修復 · 視覺 DB 路徑遷移
# ========================================== #
project_name: "R&S Echoes AI Factory (v15.7 智能 Ping-Pong 迴圈引擎)"

# 【跨平台路徑支援】透過環境變數或底層 env_manager 動態切換
workspace_roots:
  windows: "F:/AI_DRAMA_FACTORY"    # 現役開發機
  mac: "/Volumes/AI_Workspace/AI_DRAMA_FACTORY"  # Mac mini M4 生產伺服器

# 多模態智能記憶與命名空間隔離
memory_namespace: "RS_ECHOES_RECORDS_V15"
enable_smart_extraction: true

# 動態 MCP 伺服器與交付渠道
mcp_servers: ["GitHub", "FileSystem", "n8n_Webhook", "Email_SMTP", "LiteLLM_Gateway"]
delivery_channels: ["youtube_longform", "youtube_247_radio", "aws_s3_cold_storage"]

# ========================================== #
# 三引擎 LLM 架構 (Tri-Engine LLM Strategy)
# ========================================== #
models:
  # 引擎 1 (預設) — MiniMax M2.7 230B MoE via NVIDIA NIM
  primary_engine:
    provider: "minimax"
    model: "minimaxai/minimax-m2.7"
    api_base: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NVIDIA_API_KEY"
    timeout_sec: 180
    avg_latency_sec: 100
    max_tokens: 4096                  # v15.7：從 2048 提升至 4096，防止 20 首雙語曲名截斷
    use_cases: ["metadata_generation", "distrokid_cheatsheet", "complex_reasoning"]

  # 引擎 2 — 智譜 GLM-4（快速批量，推薦用於提示詞供彈）
  batch_engine:
    provider: "zhipu"
    model: "glm-4"
    api_key_env: "ZHIPUAI_API_KEY"
    avg_latency_sec: 7
    use_cases: ["ceo_prompts_batch", "quick_json", "fallback"]

  # 引擎 3 — Google Gemini 2.5 Flash（視覺解構備用）
  visual_engine:
    provider: "gemini"
    model: "gemini-2.5-flash"
    api_base: "https://generativelanguage.googleapis.com/v1beta/models"
    api_key_env: "GEMINI_API_KEY"
    avg_latency_sec: 20
    use_cases: ["visual_analysis", "multimodal", "gemini_fallback"]

  # 全域路由設定
  default_provider: "minimax"
  auto_failover: true
  enable_fast_mode: true

  # v15.7 LLM JSON 清洗三重防護
  json_cleaning_strategy:
    step1: "剝除 ```json ... ``` Markdown 包裝"
    step2: "定位首個 '{' 截取（應對 LLM 前置說明文字）"
    step3: "自動補全未閉合 '{' '}' '[' ']'（應對 max_tokens 截斷）"

# 動態上下文與資源限制
context_management:
  compact_threshold: 80000
  clearing_strategy: ["soft_trim", "hard_clear"]

resource_constraints:
  budget_limit_usd: 50
  budget_warning_thresholds: [10, 30]

# ========================================== #
# Protocol L & V: 資產庫與視覺金庫 (Vault & Metabolism)
# ========================================== #
vault_management:
  # 音樂金庫 (Protocol L)
  audio_db_type: "sqlite"
  audio_db_path: "rs_music_vault.db"
  audio_thread_safety: "threading.local()"   # 每條執行緒獨立連線，防 ProgrammingError

  # 音樂金庫選曲 v15.7 遞補邏輯
  audio_selection_fallback:
    step_4a: "New(dc=0) 不足 → 從 Gen1 遞補"
    step_4b: "Gen2 不足 → 先從 New 補，再從 Gen1 補"
    step_5: "total >= 1 即繼續（_build_playlist 重複播放填滿時長）；只有 total==0 才拋出異常"
    track_count_max_for_llm: 20    # music_metadata_engine.py 限制，防超 LLM token 上限

  # 視覺金庫 (Protocol V)
  visual_db_type: "sqlite"
  visual_db_path: "veo_visual_vault.db"
  visual_sampling_strategy: "pyramid_3tier"  # 50%新 / 25%二手 / 25%三手 + 三層兜底

  # v15.7 影片前綴命名規範
  video_naming_convention:
    pingpong_prefix: "ping_"    # ping_[name].mp4 → 正向+反向交替迴圈
    forward_prefix:  "ford_"   # ford_[name].mp4 → 正向重複迴圈
    rule: "CEO 人工審閱後命名；改名後必須同步更新 veo_visual_vault.db"
    db_sync_required: true
    classifier: "scripts/gear2_rnd/video_loop_classifier.py"

  tagging_dimensions:
    - "mood_vibe"
    - "genre_bpm"
    - "scene_visual"

  max_derivation_limit: 5
  max_vault_capacity: 100
  vault_warning_threshold: 0.9
  vault_purge_target: 0.5

  # TTAPI 備援觸發閾值
  min_vault_songs_for_assembly: 6
  ttapi_suno_target_count: 5
  minimum_inventory_warning: 10

  visual_fallback_levels:
    - "pyramid_sampling"
    - "relaxed_derivation_limit"
    - "ignore_all_limits"

# ========================================== #
# 生產線核心參數 (Pipeline Constraints)
# ========================================== #
production_constraints:
  target_duration_sec: 3600
  scene_dwell_time: 600
  sfx_mix_ratio: 0.04

  audio_lufs:
    lofi: -16.0
    light_music: -18.0

  # ========================================== #
  # 影片編碼規格（v15.7 廣播級四層防禦，鎖定）
  # ⚠️ 以下參數受 CEO 鎖定，修改須取得 CEO 書面授權
  # ========================================== #
  video_compression:
    stage1: "crf28_film_medium_fps24_closed_gop_ping_pong"  # v15.7：含 Ping-Pong 反向鑄造
    stage2: "concat_demuxer_copy_zero_recode"                # 零重編碼物理拼接
    codec_windows: "libx264"                                  # 開發機 CPU 軟解
    codec_mac_m4: "h264_videotoolbox"                        # Mac M4 Apple Silicon 硬加速

    # v15.5 廣播級 GOP 防禦陣列（鎖定）
    encoding_params:
      preset: "medium"
      tune: "film"                   # 保留水波/動態細節（非 stillimage）
      crf: 28
      pix_fmt: "yuv420p"
      gop_size: 48                   # -g 48：每 2 秒（24fps×2）一個 IDR
      keyint_min: 48                 # -keyint_min 48：最小 GOP = 最大 GOP，無例外
      sc_threshold: 0                # 關閉 libx264 動態場景偵測
      closed_gop: true               # -flags +cgop：強制封閉 GOP，B 幀不跨界
      video_track_timescale: 24000   # 統一時間基底，防浮點誤差累積
      audio_sample_rate: 48000       # Stage 2 AAC 輸出強制 48000Hz，防音訊漂移

    # v15.5 濾鏡執行順序（鎖定）
    filter_order:
      rule: "setpts=PTS-STARTPTS → fps=24 → fade（如有）→ norm"
      reason: "PTS 必須先歸零至 0-based，fade 的 st= 才能在乾淨 24fps 時間軸精準落點"

    # v15.7 Ping-Pong 反向片段（鎖定）
    reverse_filter_order:
      rule: "reverse → setpts=PTS-STARTPTS → fps=24 → norm"
      reason: "reverse 必須在 setpts 之前執行，否則反向後 PTS 仍為原始雜亂值"
      trigger: "ping_ 前綴素材自動觸發；ford_ 前綴跳過"
      fallback: "reverse 編碼失敗時自動降級為 forward 策略"

    # v15.6 源幀率修正（鎖定）
    duration_computation:
      method: "frames / source_fps"   # 從 ffprobe r_frame_rate 讀取，非硬編碼 24.0
      double_insurance: true          # 編碼後 re-probe base_mid.ts 實際幀數 / 24 作為 loop_list duration
      reason: "30fps 素材 240 幀 ÷ 24 = 10s（錯誤），÷ 30 = 8s（正確）；雙重保險確保幀級吻合"

    # v15.5 GOP-QA 自動驗證
    gop_qa:
      enabled: true
      target_interval_sec: 2.0        # g=48 / fps=24 = 2.0s
      tolerance_frames: 1.5           # 允許 ±1.5 幀誤差（±0.063s）
      action_on_fail: "log_warning"   # 不中斷產線，記錄 WARNING 供 CEO 排查

  clip_cycling_enabled: true

