# ========================================== #
# 🔒 CEO 鎖定核心引擎（v15.6+）
# ========================================== #
protected_files:
  multi_scene_processor:
    path: "scripts/gear1_prod/multi_scene_processor.py"
    version: "v15.7"
    locked_by: "CEO"
    cursor_rule: ".cursor/rules/protect-multi-scene-processor.mdc"
    modification_procedure: |
      1. 向 CEO 提出修改申請（說明原因、位置、影響評估、測試方案）
      2. 取得 CEO 書面授權
      3. 修改前備份至 spec/backups/v[version]_pre_[YYYYMMDD]/
      4. 修改後執行 GOP-QA 驗證：
         python scripts/gear1_prod/multi_scene_processor.py --sandbox --channel lofi --target-duration 120 --scene-dwell-time 60
      5. 確認日誌出現「✅ [GOP-QA] ... GOP 牢籠完好」方為驗收通過
    locked_params:
      - "vf_pre: setpts=PTS-STARTPTS,fps=24（濾鏡順序鎖定）"
      - "-flags +cgop（封閉 GOP）"
      - "-g 48 -keyint_min 48（嚴格 IDR）"
      - "-sc_threshold 0（關閉動態 I 幀）"
      - "-video_track_timescale 24000（統一時間基底）"
      - "get_video_duration(): frames / source_fps（源幀率修正）"
      - "雙重保險 re-probe base_mid.ts（幀級吻合）"
      - "v15.7：ping_ → reverse + 正反交替 loop_list；ford_ → 純正向（Ping-Pong 策略）"

# ========================================== #
# Telegram Bot (Webhook 雙模式)
# ========================================== #
telegram_bot:
  version: "v2.0"
  entrypoint: "scripts/start_telegram_bot.py"
  core_module: "scripts/gear1_prod/telegram_manager_bot.py"

  modes:
    polling:
      description: "長輪詢（開發機 / 無公網 IP）"
      command: "python scripts/start_telegram_bot.py --polling"
    webhook_ngrok:
      description: "ngrok 隧道自動建立（本地 Webhook 測試）"
      command: "python scripts/start_telegram_bot.py --ngrok"
      requires: "pip install pyngrok"
    webhook_prod:
      description: "固定公網 URL（Mac mini 生產環境）"
      command: "python scripts/start_telegram_bot.py --webhook"
      requires: "TELEGRAM_WEBHOOK_URL 需填入 .env"

  commands:
    - "/start"
    - "/status"       # HTML parse mode，按頻道分欄（Lofi / Light Music）
    - "/build"
    - "/vault_cleanup"

  security:
    user_id_whitelist: "TELEGRAM_ALLOWED_USER_ID"
    pipeline_mutex: "asyncio.Lock()"
    webhook_secret: "TELEGRAM_WEBHOOK_SECRET"
    ngrok_authtoken: "NGROK_AUTHTOKEN"

