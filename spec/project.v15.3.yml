# ========================================== #
# GLOBAL PROJECT CONFIGURATION (全域專案與資安設定) 
# ========================================== #
project_name: "R&S Echoes AI Factory (v15.3 幻影輪播矩陣 統一極速版)"

# 【跨平台路徑支援】透過環境變數或底層 env_manager 動態切換
# 若系統直讀此配置，將優先嘗試 Mac 路徑，其次為 Windows 路徑
workspace_roots:
  mac: "/Volumes/AI_Workspace/AI_DRAMA_FACTORY"
  windows: "F:/AI_DRAMA_FACTORY"

# 多模態智能記憶與命名空間隔離
memory_namespace: "RS_ECHOES_RECORDS_V15"
enable_smart_extraction: true

# 動態 MCP 伺服器與交付渠道
mcp_servers: ["GitHub", "FileSystem", "n8n_Webhook", "Email_SMTP", "LiteLLM_Gateway"]
delivery_channels: ["youtube_longform", "youtube_247_radio", "aws_s3_cold_storage"]

# 聚合網關與模型基因分流 (API Arbitrage Strategy)
models: 
  api_gateway: "https://generativelanguage.googleapis.com/v1beta/models"   
  logic_router: "gemini-2.5-flash"             # [v15.3] 100% 統一：完全淘汰 GLM-4，負責精準 JSON 企劃與供彈
  creative_engine: "gemini-2.5-flash"          # [v15.3] 100% 統一：雙棲企劃 (Dual-Genesis) 聯動大腦
  fallback_model: "gemini-2.5-flash"          
  auto_failover: true 
  enable_fast_mode: true 

# 動態上下文與資源限制
context_management: 
  compact_threshold: 80000 
  clearing_strategy: ["soft_trim", "hard_clear"] 

resource_constraints:
  budget_limit_usd: 50 # 成本極低，嚴格保護錢包
  budget_warning_thresholds: [10, 30]
  
# ========================================== #
# Protocol L & V: 資產庫與視覺金庫 (Vault & Metabolism)
# ========================================== #
vault_management:
  audio_db_type: "sqlite"
  audio_db_path: "rs_music_vault.db"          # ✅ 改為相對路徑，由底層動態組合 PROJECT_ROOT
  visual_db_type: "sqlite"
  visual_db_path: "veo_visual_vault.db"       # ✅ 改為相對路徑，跨平台完全相容
  tagging_dimensions: 
    - "mood_vibe"       # 情緒氛圍 (e.g., Chill, Dark, Uplifting)
    - "genre_bpm"       # 音樂流派與節奏快慢 (e.g., Lofi HipHop, 80bpm)
    - "scene_visual"    # [v15.0] 視覺場景標籤 (e.g., rain, neon, coffee) 用於防重複輪播
  max_derivation_limit: 3        # 財務防線：同一母帶翻製/重組次數絕對上限
  max_vault_capacity: 100        # 冷金庫容量上限 100 首
  vault_warning_threshold: 0.9   # 90% 水位觸發 Telegram 清理警報
  vault_purge_target: 0.5        # FIFO 清理後降至 50% 庫存
 
# ========================================== #
# 生產線核心參數 (Pipeline Constraints)
# ========================================== #
production_constraints:
  target_duration_sec: 3600      # 1 小時影片目標長度 
  scene_dwell_time: 600          # [v15.3] 幻影輪播：單一視覺場景沉穩停留時間 (10分鐘)
  audio_target_lufs: "dynamic"   # 動態 LUFS：Lofi 為 -16.0，Light Music 為 -18.0
  video_compression_target: "v15.3_Encode_Once_Repeat" # [v15.3] 強制 CRF 28 + stillimage + medium + fps 24 + 320k AAC
  video_looping_strategy: "v15.3_Pre-baked_Fade"       # [v15.3] 模組化渲染：預烤三版本 (in/mid/out) + 物理 Concat 陣列 + 無損 copy

# 任務編排與 IDE 續傳
orchestration: 
  max_subagent_depth: 1 
  acp_resume_session: true 

# ========================================== #
# 人類授權閘道 (CEO Remote Control)
# ========================================== #
human_approval_required: 
  - "UI_Dual_Genesis_Trigger"        # [v15.3] CEO 透過 Streamlit UI 啟動雙棲企劃與幻影輪播
  - "TG_Vault_Purge_Authorization"   # 當冷金庫達 90% 時，需 CEO 一鍵授權執行 FIFO 物理清理
  - "UI_Asset_Recycling_Selection"   # [v15.3] CEO 透過 Streamlit UI 面板，手動上傳/選擇單一母帶進行自訂縫合 (取代 rs_manager)
  
# 技能依賴與背景排程
required_skills: ["SkillGuard", "SecureClaw", "ffmpeg_toolkit", "ffprobe_toolkit", "python_api_router"]

# ========================================== #
# 產線心跳與背景排程 (The Factory Heartbeat)
# ========================================== #
heartbeat_tasks: 
  # 📊 供彈與財報 (CEO 決策輔助)
  - "CW_Generate_CEO_Prompts_Weekly_Sun_0100" 
  - "PM_Daily_Financial_Report_0800"          
  - "PM_DistroKid_Upload_Reminder_Wed_1400"   
  
# ⚙️ 產線自動化運轉 (日常吞吐)
  - "PM_Inventory_Check_Daily_1000"           
  
  # 🛡️ 系統代謝與防護 (Protocol L 守護程序)
  - "SYS_Vault_Ingestion_Daily_2200"          
  - "SYS_Clear_Dropzone_Daily_2300"           
  - "SYS_Garbage_Collection_Daily_0300"       
  - "SYS_Vault_Retirement_Weekly_Sun_0400"    
 
# 產線配額與行為限制 (財務極簡版)
production_quotas:
  weekly_prompt_arsenal: 10              
  weekly_approved_songs: 5               
  
# 專案級別沙盒與工作區隔離
sandbox_permissions: 
  allowed_tools: ["bash", "read", "write", "git", "memory.search", "python"] 
  restrictToWorkspace: true 
  mode: "non-main" 
  env_file: ".env" 
  export_env_to_python: false 

role_exceptions: 
  PM: { allowed_tools: ["n8n_Webhook", "bash", "read", "write", "python"] } 
  CW: { allowed_tools: ["http_request", "python_api_router", "bash", "read", "write"] } 
  VD: { allowed_tools: ["http_request", "n8n_Webhook", "python_api_router", "bash", "read", "write"] } 
  AD: { allowed_tools: ["http_request", "n8n_Webhook", "python_api_router", "bash", "read", "write"] } 
  QA: { allowed_tools: ["bash", "read", "write", "python"] }
  
# 🛡️ 跨工作流異常協議
exception_protocols: 
  api_timeout: "Protocol_ZR (Log Error & Fallback to Local Render)" 
  quota_exceeded: "Protocol_R (Alert Robert for Funds)" 
  content_blocked: "Protocol_C (Log Sunk Cost & Drop Topic)" 

# ✅【跨平台沙盒防護】同時允許 Mac 與 Windows 的絕對路徑，確保 OpenClaw 無論在哪台機器上都不會報錯
security_sandbox:  
  allow_read: ["/Volumes/AI_Workspace/AI_DRAMA_FACTORY", "F:/AI_DRAMA_FACTORY", "."]
  allow_write: ["/Volumes/AI_Workspace/AI_DRAMA_FACTORY", "F:/AI_DRAMA_FACTORY", "."]
  deny_all_others: true

communication_matrix: 
  internal_comms: "繁體中文 / 英文技術術語 (Concise & Technical)" 
  external_comms: "Target local language, strictly follow R&S Echoes Lo-fi vibe" 

# ========================================== #
# WORKFLOW CONFIGURATION (工作流設定) 
# ========================================== #
workflow_name: "R&S Echoes Assembly Line (v15.3 Phantom Matrix - Unified Edition)" 
workflow_discipline: "Dual-Genesis AI, Visual Pyramid Sampling, Encode-Once-Repeat, Pre-baked Fade, Audio Premixing, and Single UI Truth." 
workflow_protocols: | 
  - Protocol A (Audio): Primary trigger is CEO manual drop into ceo_approved_beats/{channel}/. AD runs Naked Mastering targeting channel-specific LUFS.
  - Protocol V (Visual): VD manages visual_vault_db.py. Executes 50/25/25 Pyramid Sampling (New/Used/Veteran) with delay-deduction metabolism.
  - Protocol Q (Assembly): QA enforces v15.3 Multi-Scene Processor. Stage 1: Encode-Once-Repeat with Pre-baked Fade (Dip to Black). Stage 2.5: Acrossfade Audio Premix. Stage 2: Zero-recode Matrix Concat Demuxer (-c:v copy) locked exactly at 3600s.
  - Protocol M (Metadata): CW outputs DistroKid JSON dynamically using pure Gemini 2.5 Flash API.
  - Protocol D (Delivery): PM utilizes Streamlit UI EXCLUSIVELY for all operations (Genesis, Asset Recycling, Database Audits). rs_manager.py is officially deprecated.
  
active_agents: ["PM", "CW", "VD", "AD", "QA", "RE"]

# ========================================== #
# AGENTS REGISTRY (角色邏輯與限制) 
# ========================================== #
agents: 
  PM: # 專案廠牌經理與審計官
    AGENT_ID: "PM" 
    AGENT_ROLE_TITLE: "R&S Echoes Label Manager & Auditor" 
    AGENT_TECH_STACK: "Workflow Orchestration, Streamlit UI, SQLite, Background Threading" 
    AGENT_TARGET_ENVIRONMENT: "Central UI Pipeline" 
    AGENT_PRIMARY_WORKSPACES: "scripts/ui/" 
    AGENT_CORE_RESPONSIBILITIES: "Operate Streamlit App exclusively. Manage background threading for UI non-blocking tasks. Monitor Dual-Vault metabolism." 
    AGENT_CRITICAL_CONSTRAINTS: "rs_manager.py is DEPRECATED. All CEO interactions MUST be routed through the Streamlit Web UI."
    
  CW: # 數位唱片企劃
    AGENT_ID: "CW" 
    AGENT_ROLE_TITLE: "Dual-Genesis Metadata & Copywriter" 
    AGENT_TECH_STACK: "JSON Structuring, Gemini 2.5 Flash Prompting" 
    AGENT_TARGET_ENVIRONMENT: "Scripting Engine" 
    AGENT_PRIMARY_WORKSPACES: "assets/final_exports/{channel}/" 
    AGENT_CORE_RESPONSIBILITIES: "Generate Dual-Plan JSON (Audio/Visual prompts) dynamically using channel-specific persona via Gemini API." 
    AGENT_CRITICAL_CONSTRAINTS: "Must output strict JSON format using Structured Outputs."
    
  AD: # 音頻與母帶工程師
    AGENT_ID: "AD" 
    AGENT_ROLE_TITLE: "Audio & Mastering Engineer" 
    AGENT_TECH_STACK: "FFmpeg, Python" 
    AGENT_TARGET_ENVIRONMENT: "Local Audio processing" 
    AGENT_PRIMARY_WORKSPACES: "assets/audio/" 
    AGENT_CORE_RESPONSIBILITIES: "Execute Naked Mastering. Provide randomized, shuffled multi-track audio lists for Stage 2.5 Audio Premix."
    AGENT_CRITICAL_CONSTRAINTS: "Local Suno Docker is forbidden. Must ensure audio premix length safely exceeds the 3600s video requirement."
    
  QA: # 幻影輪播矩陣引擎守護者
    AGENT_ID: "QA" 
    AGENT_ROLE_TITLE: "Phantom Rotation & Compression Expert" 
    AGENT_TECH_STACK: "Python, FFmpeg Filtergraphs, Encode-Once-Repeat" 
    AGENT_TARGET_ENVIRONMENT: "Local FFmpeg Rendering" 
    AGENT_PRIMARY_WORKSPACES: "assets/final_exports/{channel}/" 
    AGENT_CORE_RESPONSIBILITIES: "Execute multi_scene_processor.py. Enforce Stage 1 Modular Rendering (Pre-baked Fade) and Stage 2 Physical Concat. Guarantee flawless 1-Hour A/V Sync."
    AGENT_CRITICAL_CONSTRAINTS: "Video output MUST use CRF 28, medium preset, fps 24, -tune stillimage. Stage 2 must absolutely use -c:v copy to preserve 75x rendering speed."
    
  VD: # 視覺大師與金庫管理員
    AGENT_ID: "VD" 
    AGENT_ROLE_TITLE: "Visual Vault Director" 
    AGENT_TECH_STACK: "Python, SQLite, Veo API" 
    AGENT_TARGET_ENVIRONMENT: "Visual Vault" 
    AGENT_PRIMARY_WORKSPACES: "assets/video_clips/vault/{channel}/" 
    AGENT_CORE_RESPONSIBILITIES: "Manage visual_vault_db.py. Supply randomized, non-repeating video clips to QA based on channel requirements." 
    AGENT_CRITICAL_CONSTRAINTS: "STATIC CAMERA RULE: Absolutely no camera movement allowed. Ensure all visual assets are physically isolated by channel."
    
  RE: # 逆向工程師 (冷藏模式)
    AGENT_ID: "RE" 
    AGENT_ROLE_TITLE: "R&D Style Miner" 
    AGENT_TECH_STACK: "yt-dlp, Gemini 2.5 Flash, SQLite" 
    AGENT_TARGET_ENVIRONMENT: "YouTube / Style Vault" 
    AGENT_PRIMARY_WORKSPACES: "assets/data/" 
    AGENT_CORE_RESPONSIBILITIES: "Extract music/visual genes to enrich style_vault.db." 
    AGENT_CRITICAL_CONSTRAINTS: "DORMANT STATUS: Forbidden from running on daily heartbeat."