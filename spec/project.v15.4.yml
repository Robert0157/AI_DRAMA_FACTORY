# ========================================== #
# GLOBAL PROJECT CONFIGURATION (全域專案與資安設定)
# v15.4 — Tri-Engine LLM · Webhook Bot · Final Exports Panel · TTAPI Auto-Backup
# 最後更新：2026-04-14（post-release patch：歌曲衍生次數 3→5、Telegram 頻道分欄、ngrok authtoken、DB .conn 修正）
# ========================================== #
project_name: "R&S Echoes AI Factory (v15.4 三引擎智能供彈 · 極速矩陣版)"

# 【跨平台路徑支援】透過環境變數或底層 env_manager 動態切換
workspace_roots:
  windows: "F:/AI_DRAMA_FACTORY"    # 現役開發機 (2026-04-14 起)
  mac: "/Volumes/AI_Workspace/AI_DRAMA_FACTORY"  # Mac mini M4 生產伺服器 (預計 4/18 後啟用)

# 多模態智能記憶與命名空間隔離
memory_namespace: "RS_ECHOES_RECORDS_V15"
enable_smart_extraction: true

# 動態 MCP 伺服器與交付渠道
mcp_servers: ["GitHub", "FileSystem", "n8n_Webhook", "Email_SMTP", "LiteLLM_Gateway"]
delivery_channels: ["youtube_longform", "youtube_247_radio", "aws_s3_cold_storage"]

# ========================================== #
# 三引擎 LLM 架構 (Tri-Engine LLM Strategy)
# v15.4 重大升級：廢除「單一 Gemini」，改為三引擎各司其職
# ========================================== #
models:
  # 引擎 1 (預設) — MiniMax M2.7 230B MoE via NVIDIA NIM
  # 相容 OpenAI 協定，適合複雜 Agent 推理與發行文案
  primary_engine:
    provider: "minimax"
    model: "minimaxai/minimax-m2.7"
    api_base: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NVIDIA_API_KEY"
    timeout_sec: 180          # 230B 大模型實測約 100s，180s 給足安全邊際
    avg_latency_sec: 100      # 實測參考值（NVIDIA NIM 2026-04）
    use_cases: ["metadata_generation", "distrokid_cheatsheet", "complex_reasoning"]

  # 引擎 2 — 智譜 GLM-4（快速批量，推薦用於提示詞供彈）
  batch_engine:
    provider: "zhipu"
    model: "glm-4"
    api_key_env: "ZHIPUAI_API_KEY"
    avg_latency_sec: 7        # 實測參考值
    use_cases: ["ceo_prompts_batch", "quick_json", "fallback"]

  # 引擎 3 — Google Gemini 2.5 Flash（視覺解構備用）
  visual_engine:
    provider: "gemini"
    model: "gemini-2.5-flash"
    api_base: "https://generativelanguage.googleapis.com/v1beta/models"
    api_key_env: "GEMINI_API_KEY"
    avg_latency_sec: 20
    use_cases: ["visual_analysis", "multimodal", "gemini_fallback"]

  # 全域路由設定
  default_provider: "minimax"   # llm_client.py 的預設值
  auto_failover: true           # provider 失敗時自動降級至 zhipu
  enable_fast_mode: true

# 動態上下文與資源限制
context_management:
  compact_threshold: 80000
  clearing_strategy: ["soft_trim", "hard_clear"]

resource_constraints:
  budget_limit_usd: 50
  budget_warning_thresholds: [10, 30]

# ========================================== #
# Protocol L & V: 資產庫與視覺金庫 (Vault & Metabolism)
# ========================================== #
vault_management:
  # 音樂金庫 (Protocol L)
  audio_db_type: "sqlite"
  audio_db_path: "assets/rs_music_vault.db"
  audio_thread_safety: "threading.local()"   # v15.4：每條執行緒獨立連線，防 ProgrammingError

  # 視覺金庫 (Protocol V)
  visual_db_type: "sqlite"
  visual_db_path: "assets/veo_visual_vault.db"
  visual_sampling_strategy: "pyramid_3tier"  # 50%新 / 25%二手 / 25%三手 + 三層兜底

  tagging_dimensions:
    - "mood_vibe"       # 情緒氛圍 (Chill, Dark, Uplifting)
    - "genre_bpm"       # 音樂流派與節奏 (Lofi HipHop, 80bpm)
    - "scene_visual"    # 視覺場景標籤 (rain, neon, coffee) — 防相鄰重複

  # 衍生次數管理 (v15.4：可透過 Streamlit UI 側邊欄動態調整)
  max_derivation_limit: 5          # 預設上限（UI 可覆蓋：歌曲/影片最大重複次數）
  max_vault_capacity: 100          # 冷金庫容量上限
  vault_warning_threshold: 0.9     # 90% 水位觸發 Telegram 清理警報
  vault_purge_target: 0.5          # FIFO 清理後降至 50%

  # TTAPI 備援觸發閾值（v15.4 新增）
  min_vault_songs_for_assembly: 6  # backend.run_phase4_sequence() 前置檢查：可用曲目低於此值觸發 TTAPI 備援
  ttapi_suno_target_count: 5       # pipeline_runner._run_suno_backup() 目標曲數（ceo_approved_beats/）
  minimum_inventory_warning: 10    # 庫存警告閾值（vault_ready_for_mix），低於此值警告但繼續執行

  # 衍生次數預設值（post-release patch）
  # 音頻：3 → 5（2026-04-14 調整，延長歌曲使用壽命，降低 TTAPI 觸發頻率）
  # 影片：保持 2（視覺素材輪換要求較高）

  # v15.4 視覺金庫兜底策略
  visual_fallback_levels:
    - "pyramid_sampling"           # Level 1：50/25/25 嚴格抽樣
    - "relaxed_derivation_limit"   # Level 2：放寬至 max_limit × 2
    - "ignore_all_limits"          # Level 3：完全忽略衍生次數，確保產線不中斷

# ========================================== #
# 生產線核心參數 (Pipeline Constraints)
# ========================================== #
production_constraints:
  target_duration_sec: 3600       # 1 小時影片目標長度
  scene_dwell_time: 600           # 幻影輪播：單場景停留時間 (10 分鐘，共 6 場景)
  sfx_mix_ratio: 0.04             # SFX 混音比率 4%（lofi_assembler.py volume=0.04）

  # LUFS 頻道對應規格
  audio_lufs:
    lofi: -16.0                   # 檔名含 _-16.0LUFS.wav
    light_music: -18.0            # 檔名含 _-18.0LUFS.wav

  # 影片編碼規格
  video_compression:
    stage1: "crf28_stillimage_medium_fps24"   # Encode-Once-Repeat 標準化
    stage2: "concat_demuxer_copy"             # 75x 速無損物理拼接
    codec_windows: "libx264"                  # 開發機 CPU 軟解
    codec_mac_m4: "h264_videotoolbox"         # Mac M4 Apple Silicon 硬加速

  # Clip Cycling（v15.4 新增）
  clip_cycling_enabled: true       # 金庫素材不足時循環複用，防止 Fatal Error

# ========================================== #
# Streamlit UI 功能對應 (UI Tab Map)
# ========================================== #
ui_tabs:
  tab1: "資產入庫與金庫儀表板"       # 音樂/視覺金庫水位、CEO 上傳、金庫重置
  tab2: "企劃大腦供彈"               # 三引擎選擇 + 可調組數（預設 5 組）+ 耗時預估
  tab3: "批量母帶處理"               # Phase 1+2 Only
  tab4: "影音發行流水線"             # Step1+Step2 + Final Exports 面板（補生成）
  tab5: "CEO 全自動產線"             # pipeline_runner.py Phase 1-5
  tab6: "系統維護 & 金庫代謝"        # 金庫重置、健康檢查

ui_sidebar_controls:
  - name: "歌曲最大重複次數"         # 動態預覽衍生影響（原「聽覺最大重複次數」）
    config_key: "max_audio_deriv"
    default: 5
    range: [1, 10]
  - name: "影片最大重複次數"         # 動態預覽衍生影響（原「視覺最大重複次數」）
    config_key: "max_video_deriv"
    default: 3
    range: [1, 10]

# ========================================== #
# 人類授權閘道 (CEO Remote Control)
# ========================================== #
human_approval_required:
  - "UI_Tab2_Prompts_Genesis"        # CEO 透過 Tab2 選擇引擎與組數，點擊「生成一週份提示詞」
  - "UI_Tab4_Step1_Master_Tape"      # CEO 透過 Tab4 Step1 啟動 1 小時母帶 + 發行文件
  - "UI_Tab4_Step2_Phantom_Matrix"   # CEO 透過 Tab4 Step2 啟動幻影輪播（幻影矩陣）
  - "UI_Tab5_Full_Pipeline"          # CEO 透過 Tab5 一鍵啟動全自動 Phase 1-5 產線
  - "TG_Vault_Purge_Authorization"   # Telegram 授權 FIFO 清理（金庫達 90% 時）
  - "UI_Asset_Recycling_Selection"   # CEO 透過 Streamlit UI 手動上傳/選擇母帶

# ========================================== #
# Telegram Bot (v15.4 Webhook 雙模式)
# ========================================== #
telegram_bot:
  version: "v2.0"
  entrypoint: "scripts/start_telegram_bot.py"
  core_module: "scripts/gear1_prod/telegram_manager_bot.py"

  # 啟動模式（自動依 .env 決定）
  modes:
    polling:
      description: "長輪詢（開發機 / 無公網 IP）"
      command: "python scripts/start_telegram_bot.py --polling"
    webhook_ngrok:
      description: "ngrok 隧道自動建立（本地 Webhook 測試）"
      command: "python scripts/start_telegram_bot.py --ngrok"
      requires: "pip install pyngrok"
    webhook_prod:
      description: "固定公網 URL（Mac mini 生產環境）"
      command: "python scripts/start_telegram_bot.py --webhook"
      requires: "TELEGRAM_WEBHOOK_URL 需填入 .env"

  # Bot 指令清單
  commands:
    - "/start"        # 歡迎訊息
    - "/status"       # 金庫戰情報表（按頻道分欄：🎵 Lofi / 🌟 Light Music，HTML parse mode）
    - "/build"        # 遠端啟動產線流程（SFX 選擇 → 確認 → 背景執行）
    - "/vault_cleanup" # 查詢冷庫容量 + CEO 批准 FIFO 清理

  security:
    user_id_whitelist: "TELEGRAM_ALLOWED_USER_ID"  # 只允許授權 CEO 操作
    pipeline_mutex: "asyncio.Lock()"               # 防止重複觸發
    webhook_secret: "TELEGRAM_WEBHOOK_SECRET"      # POST 簽名驗證
    ngrok_authtoken: "NGROK_AUTHTOKEN"             # ngrok 隧道認證（--ngrok 模式必填，免費帳戶）
                                                   # 取得：https://dashboard.ngrok.com/get-started/your-authtoken

# ========================================== #
# 產線腳本對應 (Script Registry)
# v15.4 實體代碼對齊
# ========================================== #
script_registry:
  # 核心產線
  full_pipeline:          "scripts/gear1_prod/pipeline_runner.py"        # Phase 1-5 全自動
  audio_assembler:        "scripts/gear1_prod/lofi_assembler.py"          # 1hr 無縫母帶縫合 (4% SFX)
  video_assembler:        "scripts/gear1_prod/multi_scene_processor.py"   # 幻影輪播矩陣引擎
  metadata_engine:        "scripts/gear1_prod/music_metadata_engine.py"   # LLM 發行企劃生成
  prompts_generator:      "scripts/gear1_prod/generate_ceo_prompts.py"    # 提示詞供彈（預設 5 組）
  mastering_engine:       "scripts/gear1_prod/audio_mastering_engine.py"  # 母帶化 (-16/-18 LUFS)

  # UI 層
  ui_app:                 "scripts/ui/app.py"                             # Streamlit 六頁籤中控台
  ui_backend:             "scripts/ui/backend.py"                         # 後端引擎（Zombie防護 + Log流）

  # 金庫管理
  audio_vault:            "scripts/gear2_rnd/vault_database.py"           # 音樂金庫（threading.local）
  visual_vault:           "scripts/gear2_rnd/visual_vault_db.py"          # 視覺金庫（三層兜底）

  # 通用工具
  llm_client:             "scripts/common/llm_client.py"                  # 三引擎路由閘道（timeout=180s）
  env_manager:            "scripts/common/env_manager.py"                 # 全域環境變數統一派發
  telegram_bot:           "scripts/gear1_prod/telegram_manager_bot.py"    # Telegram Bot (Webhook v2)

  # Telegram Bot 啟動
  telegram_bot_launcher:  "scripts/start_telegram_bot.py"          # 支援 --polling / --webhook / --ngrok

  # TTAPI 音樂生成
  suno_api_engine:         "scripts/gear1_prod/suno_api_engine.py"  # TTAPI Suno 代理，自動補充歌曲

  # 退役腳本（保留供 diff 參考）
  deprecated:
    - "scripts/gear1_prod/rs_manager.py"     # 舊版 CLI 中控（已被 Streamlit UI 取代）
    - "scripts/gear1_prod/video_processor.py" # 舊版單場景引擎（已被 multi_scene 取代）

# 任務編排與 IDE 續傳
orchestration:
  max_subagent_depth: 1
  acp_resume_session: true

# 技能依賴
required_skills: ["SkillGuard", "SecureClaw", "ffmpeg_toolkit", "ffprobe_toolkit", "python_api_router"]

# ========================================== #
# 產線心跳與背景排程 (The Factory Heartbeat)
# ========================================== #
heartbeat_tasks:
  # 📊 供彈與財報 (CEO 決策輔助)
  - "CW_Generate_CEO_Prompts_Weekly_Sun_0100"   # 每週日 01:00 自動生成 5 組提示詞 (minimax)
  - "PM_Daily_Financial_Report_0800"
  - "PM_DistroKid_Upload_Reminder_Wed_1400"

  # ⚙️ 產線自動化運轉
  - "PM_Inventory_Check_Daily_1000"

  # 🛡️ 系統代謝與防護
  - "SYS_Vault_Ingestion_Daily_2200"
  - "SYS_Clear_Dropzone_Daily_2300"
  - "SYS_Garbage_Collection_Daily_0300"
  - "SYS_Vault_Retirement_Weekly_Sun_0400"

# 產線配額與行為限制
production_quotas:
  weekly_prompt_batch_size: 5        # generate_ceo_prompts.py 預設組數（從 20 降為 5）
  weekly_approved_songs: 5
  minimax_est_sec_per_prompt: 100    # MiniMax 230B 實測每次約 100s，5 組約 8-9 分鐘
  ttapi_suno_timeout_sec: 600        # suno_api_engine.py 單首生成超時（10 分鐘）
  ttapi_suno_poll_interval_sec: 30   # 輪詢 Suno 任務狀態間隔

# 專案級別沙盒與工作區隔離
sandbox_permissions:
  allowed_tools: ["bash", "read", "write", "git", "memory.search", "python"]
  restrictToWorkspace: true
  mode: "non-main"
  env_file: ".env"
  export_env_to_python: false

role_exceptions:
  PM: { allowed_tools: ["n8n_Webhook", "bash", "read", "write", "python"] }
  CW: { allowed_tools: ["http_request", "python_api_router", "bash", "read", "write"] }
  VD: { allowed_tools: ["http_request", "n8n_Webhook", "python_api_router", "bash", "read", "write"] }
  AD: { allowed_tools: ["http_request", "n8n_Webhook", "python_api_router", "bash", "read", "write"] }
  QA: { allowed_tools: ["bash", "read", "write", "python"] }

# 🛡️ 跨工作流異常協議
exception_protocols:
  api_timeout: "Protocol_ZR (Log Error & Fallback to Zhipu GLM-4)"   # v15.4：降級至 Zhipu 而非本地
  quota_exceeded: "Protocol_R (Alert CEO via Telegram for Funds)"
  content_blocked: "Protocol_C (Log Sunk Cost & Drop Topic)"
  minimax_slow: "Protocol_S (Switch provider to zhipu for batch tasks)" # v15.4 新增
  vault_shortage_audio: "Protocol_L (Auto TTAPI Backup via suno_api_engine.py → threshold: Tab4<6, Tab5<5)"
  vault_shortage_visual: "Protocol_V3 (3-tier fallback: pyramid → relaxed_limit → ignore_all)"
  ttapi_backup_failed: "Protocol_FAIL (Return error to UI with manual action guidance, NEVER silent fail)"
  ngrok_auth_error: "ERR_NGROK_4018 → Check NGROK_AUTHTOKEN in .env; sign up free at dashboard.ngrok.com"
  telegram_parse_error: "MarkdownV2 special chars → Switch to parse_mode=HTML; only escape &, <, > needed"
  sqlite_threading_error: "ProgrammingError → Use vault.conn property only; never vault._get_connection()"

# ✅ 跨平台沙盒防護
security_sandbox:
  allow_read: ["/Volumes/AI_Workspace/AI_DRAMA_FACTORY", "F:/AI_DRAMA_FACTORY", "."]
  allow_write: ["/Volumes/AI_Workspace/AI_DRAMA_FACTORY", "F:/AI_DRAMA_FACTORY", "."]
  deny_all_others: true

communication_matrix:
  internal_comms: "繁體中文 / 英文技術術語 (Concise & Technical)"
  external_comms: "Target local language, strictly follow R&S Echoes Lo-fi vibe"

# ========================================== #
# WORKFLOW CONFIGURATION (工作流設定)
# ========================================== #
workflow_name: "R&S Echoes Assembly Line (v15.4 Tri-Engine · Phantom Matrix)"
workflow_discipline: "Tri-Engine LLM (MiniMax/Zhipu/Gemini), Visual Pyramid 3-Tier Fallback, Clip Cycling, Encode-Once-Repeat, Pre-baked Fade, Audio Premixing, Webhook Bot, Single UI Truth."
workflow_protocols: |
  - Protocol A (Audio): CEO drops into ceo_approved_beats/{channel}/. AD runs audio_mastering_engine.py targeting channel-specific LUFS (-16 lofi / -18 light_music). Results synced to rs_music_vault.db via _sync_mastered_to_vault().
  - Protocol L (TTAPI Auto-Backup): Triggered automatically when vault is below threshold. Tab5 (pipeline_runner): triggers if ceo_approved_beats/ < 5 tracks. Tab4 (backend.run_phase4_sequence): triggers if vault_ready_for_mix/ usable tracks < 6. Backup order: ① Protocol L derivation (tempo/pitch variation from tracks with derivation_count < 3) → ② TTAPI Suno via suno_api_engine.py (requires TTAPI_KEY). Timeout: 600s/track. Skip flag: --skip-backup.
  - Protocol S (Assembly): lofi_assembler.py sews 1-hour seamless WAV with 4% SFX, enforces --max-derivation-limit. Only runs AFTER Protocol L backup confirms sufficient tracks.
  - Protocol V (Visual): VD manages visual_vault_db.py. Executes 50/25/25 Pyramid Sampling with 3-tier fallback + Clip Cycling to prevent fatal shortage errors.
  - Protocol Q (Video Assembly): QA enforces multi_scene_processor.py. Stage 1: Encode-Once-Repeat + Pre-baked Fade. Stage 2.5: Acrossfade Audio Premix. Stage 2: Zero-recode Matrix Concat (-c:v copy, -t 3600).
  - Protocol M (Metadata): CW generates Tracklist + DistroKid CheatSheet + YouTube CheatSheet via music_metadata_engine.py (provider=minimax default). Tab4 Final Exports panel auto-detects missing docs and offers one-click regeneration. backend.regenerate_all_missing_docs() handles bulk recovery.
  - Protocol D (Delivery): PM operates Streamlit UI EXCLUSIVELY (Tab1-6). pipeline_runner.py orchestrates Phase 1-5 via Tab5. Tab4 runs step-by-step: run_phase4_sequence() → multi_scene_processor.py → Final Exports panel. rs_manager.py is officially deprecated.
  - Protocol T (Telegram): CEO uses Telegram Bot (Webhook v2) for remote vault status, pipeline trigger, and vault cleanup. start_telegram_bot.py supports --polling / --webhook / --ngrok modes. telegram_manager_bot.py handles commands and asyncio.Lock() pipeline mutex. /status uses HTML parse mode with per-channel breakdown (Lofi / Light Music).
  - Protocol DB (Database Access): ALL sqlite access through VaultDatabase MUST use .conn property (threading.local). _get_connection() is ABOLISHED. telegram_manager_bot.py and cloud_archiver.py have been migrated. Any new code using vault._get_connection() is a critical bug.

pipeline_runner_phases:
  # Phase 執行順序（_run_pipeline_workflow 內部）
  phase_1_mastering:
    script: "scripts/gear1_prod/audio_mastering_engine.py"
    input: "assets/audio/ceo_approved_beats/{channel}/"
    output: "assets/audio/vault_ready_for_mix/{channel}/"
    skip_flag: "--skip-mastering"
  phase_2_vault_sync:
    function: "_sync_mastered_to_vault()"
    action: "Sync new tracks into rs_music_vault.db with derivation_count=0"
  phase_35_ttapi_backup:
    function: "_run_suno_backup(target_count=5)"
    trigger: "ceo_approved_beats/ track count < 5"
    skip_flag: "--skip-backup"
    sub_steps:
      - "Protocol L derivation (tempo/pitch variation from existing vault tracks)"
      - "Read daily_prompts_{CH}_*.txt or generate via generate_ceo_prompts.py"
      - "suno_api_engine.py → TTAPI POST → poll → download MP3"
      - "audio_mastering_engine.py → rs_music_vault.db sync"
  phase_3_metadata:
    script: "scripts/gear1_prod/music_metadata_engine.py"
    args: "--provider minimax"
    output: "Tracklist, DistroKid_CheatSheet, metadata_distrokid_{ch}.json"
    skip_flag: "--skip-metadata"
  phase_4_assembly:
    script: "scripts/gear1_prod/lofi_assembler.py"
    output: "R&S_Echoes_{ch}_1HrMix_[TS].wav"
    skip_flag: "--skip-assembler"
  phase_45_youtube:
    function: "_finalize_youtube_cheatsheet()"
    output: "YouTube_CheatSheet_{ch}_[TS].txt"
  phase_5_video:
    script: "scripts/gear1_prod/multi_scene_processor.py"
    modes: ["--auto-visual", "--bg-video PATH", "--bg-videos PATH..."]
    output: "R&S_Echoes_{ch}_1HrMix_[TS].mp4"

active_agents: ["PM", "CW", "VD", "AD", "QA", "RE"]

# ========================================== #
# AGENTS REGISTRY (角色邏輯與限制)
# ========================================== #
agents:
  PM: # 專案廠牌經理與審計官
    AGENT_ID: "PM"
    AGENT_ROLE_TITLE: "R&S Echoes Label Manager & Auditor"
    AGENT_TECH_STACK: "Streamlit UI, SQLite, Background Threading, Zombie-Process atexit, Real-time Log Streaming"
    AGENT_TARGET_ENVIRONMENT: "Central UI Pipeline"
    AGENT_PRIMARY_WORKSPACES: "scripts/ui/"
    AGENT_CORE_RESPONSIBILITIES: |
      Operate Streamlit App exclusively (Tab1-6).
